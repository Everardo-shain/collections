<!doctype html>
<html lang="en" class="light">
<head>
    <script>
      (function() {
        // Lógica de tema existente
        var t = localStorage.getItem('collection-theme') || 'system';
        if (t === 'system') {
          t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.className = t;

        // NUEVA Lógica de color de acento
        var savedAccent = localStorage.getItem('last-accent-color');
        if (savedAccent) {
          document.documentElement.style.setProperty('--accent-color', savedAccent);
        }
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Everardo´s Collection</title>
    <meta name="description" content="A curated digital archive of personal collections.">

    <link rel="icon" type="image/svg+xml" href="/vite.svg">

    <meta property="og:title" content="Everardo´s Collection">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-image.png">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

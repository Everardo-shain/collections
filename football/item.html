<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Item Details</title>
  <link rel="stylesheet" href="../assets/styles/global.css">
  <link rel="stylesheet" href="../assets/styles/item.css">
</head>
  <body>
  <div id="navbar"></div>

  <link rel="stylesheet" href="../assets/styles/navbar.css">
  <script src="../assets/scripts/navbar.js" defer></script>

  <script>
    fetch("../assets/components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>
  <div class="container">
    <div id="content">
      <div id="gallery"></div>

      <div id="details">
        <div id="breadcrumbs"></div>
        <h1 id="title"></h1>
      </div>
    </div>

  </div>

  <!-- Lightbox (fuera del container) -->
  <div id="lightbox">
    <span id="close">&times;</span>
    <img id="lightbox-img">
    <button id="prev">&#10094;</button>
    <button id="next">&#10095;</button>
  </div>

  <script src="../assets/scripts/item.js" defer></script>

</body>
</html>

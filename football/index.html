<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Everardo’s Football Collection</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../assets/styles/global.css">
  <link rel="stylesheet" href="../assets/styles/index.css">
  <link rel="stylesheet" href="../assets/styles/navbar.css">
</head>

<body>

  <!-- 🔥 Navbar -->
  <div id="navbar"></div>

  <script>
    fetch("../assets/components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>

  <script type="module" src="../assets/scripts/navbar.js"></script>

  <div id="breadcrumb-wrapper">
    <div class="container">
      <h2 id="filters"></h2>
    </div>
  </div>

  <div class="container">

    <!-- HEADER -->
    <div id="category-header" class="category-header"></div>

    <!-- 🔥 FALTABA ESTO -->
    <div class="layout">

      <!-- Sidebar -->
      <aside class="filters" id="filters-sidebar">

        <div id="active-filters-container">
          <div class="active-header">
            <span>Active filters</span>
            <button id="clear-all">Clear all ⟳</button>
          </div>
          <div id="active-filters"></div>
        </div>

      </aside>

      <!-- MAIN CONTENT -->
      <main class="content">
        <h2 id="results-count"></h2>
        <div id="grid"></div>
      </main>

    </div>

  </div>

  <script type="module" src="../assets/scripts/index.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Everardo’s Football Collection</title>

  <link rel="stylesheet" href="../assets/styles/global.css">
  <link rel="stylesheet" href="../assets/styles/index.css">
</head>
<body>

  <div id="navbar"></div>

  <link rel="stylesheet" href="../assets/styles/navbar.css">
  <script src="../assets/scripts/navbar.js" defer></script>

  <script>
    fetch("../assets/components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>
  <div class="container">

    <h2 id="filters"></h2>
    <p id="search-info"></p>

    <div class="layout">

      <!-- Sidebar -->
      <aside class="filters">
        <div class="filter-group">
          <div class="filter-header">Product</div>
          <div class="filter-content" id="filter-product"></div>
        </div>

        <div class="filter-group">
          <div class="filter-header">Team</div>
          <div class="filter-content" id="filter-team"></div>
        </div>

        <div id="active-filters-container">
          <div class="active-header">
            <span>Active filters</span>
            <button id="clear-all">Clear all ⟳</button>
          </div>
          <div id="active-filters"></div>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="content">

        <h2 id="results-count"></h2> <!-- ✅ aquí -->

        <div id="grid"></div>        <!-- ✅ único -->

      </main>

    </div>

  </div>

  <script src="../assets/scripts/index.js" defer></script>

</body>
</html>
